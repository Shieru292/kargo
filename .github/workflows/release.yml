name: Build and Release Native Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      - name: Build Native Image
        run: ./gradlew nativeCompile --no-daemon

      - name: Prepare Artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mv build/native/nativeCompile/kargo kargo-${{ runner.os }}-${{ runner.arch }}
          zip kargo-${{ runner.os }}-${{ runner.arch }}.zip kargo-${{ runner.os }}-${{ runner.arch }}

      - name: Prepare Artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Rename-Item -Path "build\native\nativeCompile\kargo.exe" -NewName "kargo-Windows-x64.exe"
          Compress-Archive -Path "kargo-Windows-x64.exe" -DestinationPath "kargo-Windows-x64.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kargo-artifact-${{ runner.os }}-${{ runner.arch }}
          path: |
            *.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
